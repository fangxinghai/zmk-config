name: Build ZMK Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build Custom Macropad Firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr Export
        run: west zephyr-export

      - name: Build firmware
        run: west build -s zmk/app -b nice_nano -- -DSHIELD=custom_macropad -DZMK_CONFIG="$GITHUB_WORKSPACE/config"

      - name: Rename artifacts
        run: |
          mkdir -p artifacts
          cp build/zephyr/zmk.uf2 artifacts/custom_macropad-nice_nano-zmk.uf2 2>/dev/null || true
          cp build/zephyr/zmk.hex artifacts/custom_macropad-nice_nano-zmk.hex 2>/dev/null || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: custom_macropad-firmware
          path: artifacts/
          if-no-files-found: error
